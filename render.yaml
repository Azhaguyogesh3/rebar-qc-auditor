services:
  - type: web
    name: rebar-qc-auditor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app_v2.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # You fill this in on Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: uploads
      mountPath: /uploads
      sizeGB: 1
