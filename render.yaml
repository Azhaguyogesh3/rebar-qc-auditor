services:
  - type: web
    name: rebar-qc-auditor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_v2:app --workers 2 --timeout 1800 --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # You fill this in on Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: uploads
      mountPath: /uploads
      sizeGB: 1
